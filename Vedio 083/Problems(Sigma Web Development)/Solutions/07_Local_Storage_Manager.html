<!-- 7. The Local Storage Manager:
   You are working on a note-taking app, and you want to implement a function named saveNoteToLocalStorage that takes a note object and saves it to the browser's local storage.
 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local Storage Manager</title>
</head>

<body>
    <button>Add Note</button>
    <div class="note"></div>
    <script>
        // You can also store object in localstorage of your computer
        // a = {
        //     "harry" : 1,
        //     "Sami" : 67
        // }
        // JSON.stringify(a);
        // localStorage.setItem("guys" ,  JSON.stringify(a))

        // localStorage.getItem("guys")
        // JSON.parse(localStorage.getItem("guys"));
        // // ----------------------------------------------------- //


        function saveNoteToLocalStorage(note) {
            localStorage.setItem("note" ,note);
        }

        let note = localStorage.getItem("note");
        if(note) {
            document.querySelector(".note").innerHTML = note;
        }
        
        
        document.querySelector("button").addEventListener("click" ,() => {
            let note = prompt("Enter a note");
            saveNoteToLocalStorage(note);
            document.querySelector(".note").innerHTML = note;
        })
        // ---------------------------------------------------//



    </script>
</body>

</html>
