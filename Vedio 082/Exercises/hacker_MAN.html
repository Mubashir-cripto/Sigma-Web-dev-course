<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker MAN</title>
</head>

<body>
    </div>
    <script>
        
        function goONTimer(data) {
            let rand = (Math.floor(1 + 4 * Math.random())) * 1000;
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(data)
                }, rand );
            })
        }

        (async function main() {

            let t = setInterval(() => {
                let last = document.body.getElementsByTagName('div');
                last = last[last.length - 1];
                if(last.innerHTML.endsWith("...")) {
                    last.innerHTML = last.innerHTML.slice(0 ,last.innerHTML.length - 3)
                } else {
                    last.innerHTML = last.innerHTML + ".";
                }

            }, 50);

            let messages = [
                "Initializing Hacking Program",
                "Hacking Ashish's username",
                "User found Ashish's 17",
                "Connecting to facebook"
            ];

            for (let i = 0; i < messages.length ; i++) {
                let elem = document.createElement('div');
                elem.innerHTML = await goONTimer(messages[i]);
                document.body.append(elem)
            }

           
            clearInterval(t)
        })()
    </script>
</body>
</html>
